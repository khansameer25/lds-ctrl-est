name: Build Wheels (Simple)

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Build wheels
      run: |
        pip install cibuildwheel
        python -m cibuildwheel python/ --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
        CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
        CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
        
        # Install system dependencies
        CIBW_BEFORE_ALL_LINUX: "dnf install -y cmake ninja-build gcc-c++ openblas-devel hdf5-devel"
        CIBW_BEFORE_ALL_MACOS: "brew install cmake ninja openblas hdf5"  
        CIBW_BEFORE_ALL_WINDOWS: "choco install cmake"
        
        # Build
        CIBW_BEFORE_BUILD: "pip install pybind11 numpy && cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DLDSCTRLEST_BUILD_PYTHON=ON && cmake --build build --target python_modules"
        
        # Test
        CIBW_TEST_COMMAND: "python -c 'import ldsctrlest; print(\"Success!\")'"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: wheelhouse/*.whl

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: wheels
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        path: dist
        merge-multiple: true
    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
