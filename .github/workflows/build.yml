name: Build and Test ldsCtrlEst

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up dependencies for macOS and Linux
      if: runner.os != 'Windows'
      run: |
        if [ "${{ runner.os }}" == "macOS" ]; then
          brew install cmake ninja
        elif [ "${{ runner.os }}" == "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
        fi

    - name: Set up dependencies for Windows
      if: runner.os == 'Windows'
      run: |
        choco install cmake
  
    - name: Run vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: 'vcpkg.json'
        runVcpkgInstall: true
        
    - name: Cache build directory
      uses: actions/cache@v3
      with:
        path: build
        key: build-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          build-${{ matrix.os }}-
          
    - name: Configure and build for macOS/Linux
      if: runner.os != 'Windows'
      uses: lukka/run-cmake@v10
      with:
        cmakeListsTxtPath: CMakeLists.txt
        configurePreset: 'linux-release'
        buildPreset: 'linux-release'

    - name: Configure and build for Windows
      if: runner.os == 'Windows'
      uses: lukka/run-cmake@v10
      with:
        cmakeListsTxtPath: CMakeLists.txt
        configurePreset: 'windows-release'
        buildPreset: 'windows-release'
        buildPresetAdditionalArgs: "['--config Release']"
        
    - name: Install and Update PATH (Windows only)
      if: runner.os == 'Windows'
      run: |
        cd build
        cmake --install .
        echo "${{github.workspace}}/install/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Run tests
      run: |
        cd build
        ctest -C Release
  
  build_python_package:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest matplotlib cmake build
        shell: bash

      - name: Configure and build Python modules with CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir build && cd build
          cmake -DLDSCTRLEST_BUILD_PYTHON=ON \
                -DLDSCTRLEST_BUILD_STATIC=ON \
                -DCMAKE_BUILD_TYPE=Release \
                -DPYTHON_EXECUTABLE=$(which python) \
                -DPYTHON_INCLUDE_DIR=$(python -c 'from sysconfig import get_paths as gp; print(gp()["include"])') \
                -DPYTHON_LIBRARIES=$(python -c 'from sysconfig import get_paths as gp; print(gp()["stdlib"])') \
                -G "Unix Makefiles" ..
          cmake --build . --target python_modules
        shell: bash

      - name: Configure and build Python modules with CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir build
          cd build
          cmake -DLDSCTRLEST_BUILD_PYTHON=ON `
                -DLDSCTRLEST_BUILD_STATIC=ON `
                -DCMAKE_BUILD_TYPE=Release `
                -DPYTHON_EXECUTABLE="${{ env.pythonLocation }}\python.exe" `
                -DPYTHON_INCLUDE_DIR="${{ env.pythonLocation }}\include" `
                -DPYTHON_LIBRARIES="${{ env.pythonLocation }}\libs" `
                -G "NMake Makefiles" ..
          cmake --build . --target python_modules
        shell: pwsh

      - name: Install Python package and run tests
        run: |
          cd build/python
          pip install .
          pytest
        shell: bash

      - name: Build wheel and sdist
        run: |
          cd build/python
          python -m build --wheel
        shell: bash

      - name: Test wheel installation (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m venv test_env
          source test_env/bin/activate
          cd build/python
          pip install dist/*.whl
          pip install numpy
          python -c "import ldsctrlest; print(ldsctrlest.__version__)"
        shell: bash

      - name: Test wheel installation (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv test_env
          test_env\Scripts\activate
          cd build\python
          pip install dist\*.whl
          pip install numpy
          python -c "import ldsctrlest; print(ldsctrlest.__version__)"
        shell: cmd

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@v1.4.2
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages_dir: build/python/dist
          repository_url: https://test.pypi.org/legacy/

      - name: Test PyPI Installation (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m venv pypi_test_env
          source pypi_test_env/bin/activate
          pip install -v -i https://test.pypi.org/simple/ ldsctrlest
          pip install numpy
          echo "Installed packages:"
          pip list
          echo "Package contents:"
          python -c "import os, ldsctrlest; print('\n'.join(os.path.join(root,f) for root,_,files in os.walk(os.path.dirname(ldsctrlest.__file__)) for f in files))"
          python -c "import ldsctrlest; print('SUCCESS:', ldsctrlest.__version__)"
        shell: bash
        env:
          PIP_FIND_LINKS: "https://pypi.org/simple"
          PIP_VERBOSE: 1

      - name: Test PyPI Installation (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv pypi_test_env
          pypi_test_env\Scripts\activate
          pip install -v -i https://test.pypi.org/simple/ ldsctrlest
          pip install numpy
          echo "Installed packages:"
          pip list
          echo "Package contents:"
          python -c "import os, ldsctrlest; print('\n'.join(os.path.join(root,f) for root,_,files in os.walk(os.path.dirname(ldsctrlest.__file__)) for f in files))"
          python -c "import ldsctrlest; print('SUCCESS:', ldsctrlest.__version__)"
        shell: cmd
        env:
          PIP_FIND_LINKS: "https://pypi.org/simple"
          PIP_VERBOSE: 1
