name: Build and Test ldsCtrlEst

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    # Install dependencies for macOS/Linux
    - name: Set up dependencies for macOS and Linux
      if: runner.os != 'Windows'
      run: |
        if [ "${{ runner.os }}" == "macOS" ]; then
          brew install cmake ninja
        elif [ "${{ runner.os }}" == "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ninja-build
        fi

    # Install dependencies for Windows
    - name: Set up dependencies for Windows
      if: runner.os == 'Windows'
      run: choco install cmake ninja

    # Run vcpkg for dependency management
    - name: Run vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: 'vcpkg.json'
        runVcpkgInstall: true

    # Cache build directory for faster runs
    - name: Cache build directory
      uses: actions/cache@v3
      with:
        path: build
        key: build-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          build-${{ matrix.os }}-

    # Configure and build for macOS/Linux
    - name: Configure and build for macOS/Linux
      if: runner.os != 'Windows'
      uses: lukka/run-cmake@v10
      with:
        cmakeListsTxtPath: CMakeLists.txt
        configurePreset: 'linux-release'
        buildPreset: 'linux-release'

    # Configure and build for Windows
    - name: Configure and build for Windows
      if: runner.os == 'Windows'
      uses: lukka/run-cmake@v10
      with:
        cmakeListsTxtPath: CMakeLists.txt
        configurePreset: 'windows-release'
        buildPreset: 'windows-release'
        buildWithCMake: true
        verbose: true

    # Debug build output directory
    - name: Debug Build Directory (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "Checking build output directory..."
        dir build

    # Build manually if necessary (Windows)
    - name: Build Manually (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake --build build --config Release --verbose

    # Check for DLL (Windows)
    - name: Check for ldsCtrlEst.dll
      if: runner.os == 'Windows'
      run: |
        echo "Looking for ldsCtrlEst.dll..."
        Get-ChildItem -Path build -Recurse -Filter ldsCtrlEst.dll

    # Install Build Artifacts (Windows)
    - name: Install Build Artifacts (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake --install build --prefix install
        echo "Installed files:"
        dir install

    # Run tests
    - name: Run tests
      run: |
        cd build
        ctest -C Release --output-on-failure
