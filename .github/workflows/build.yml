name: Build Wheels (Simple)

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Build wheels
        run: |
          pip install cibuildwheel
          python -m cibuildwheel python/ --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Install system dependencies with static libraries
          CIBW_BEFORE_ALL_LINUX: "dnf install -y cmake ninja-build gcc-c++ gcc-gfortran make openblas-devel openblas-static lapack-devel lapack-static hdf5-devel hdf5-static libgfortran-static libquadmath-static"
          CIBW_BEFORE_ALL_MACOS: "brew install cmake ninja openblas hdf5"
          CIBW_BEFORE_ALL_WINDOWS: "choco install cmake ninja"

          # Build without vcpkg - comprehensive static linking approach
          CIBW_BEFORE_BUILD: 'pip install pybind11 numpy && sed -i ''s|include(HDF5)|# include(HDF5) # Skipped for Python builds|'' CMakeLists.txt && sed -i ''s|include(Armadillo)|# include(Armadillo) # Skipped for Python builds|'' CMakeLists.txt && sed -i ''s|list(APPEND PROJECT_REQUIRED_LIBRARIES_ABSOLUTE_NAME carma::carma Python3::Python)|list(APPEND PROJECT_REQUIRED_LIBRARIES_ABSOLUTE_NAME carma::carma) # Python3::Python removed for wheel builds|'' cmake/Modules/pybind11.cmake && sed -i ''/set(CMAKE_TOOLCHAIN_FILE.*vcpkg/,+1s/^/# /'' CMakeLists.txt && CC=gcc CXX=g++ cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DLDSCTRLEST_BUILD_PYTHON=ON -DLDSCTRLEST_BUILD_FITTING=OFF -DCMAKE_TOOLCHAIN_FILE="" -DCMAKE_MAKE_PROGRAM=make -DCMAKE_VERBOSE_MAKEFILE=ON && find build -name ''link.txt'' -exec sed -i ''s|$| /usr/lib64/liblapack.a /usr/lib64/libopenblas.a /usr/lib/gcc/x86_64-redhat-linux/8/libgfortran.a /usr/lib/gcc/x86_64-redhat-linux/8/libquadmath.a -static-libgcc -static-libstdc++|'' {} \\; && cmake --build build --target python_modules -- VERBOSE=1'

          # Deep debugging - comprehensive analysis of linking and symbols
          CIBW_TEST_COMMAND: "echo '=== LINK ANALYSIS ===' && ls -la /usr/lib64/lib{openblas,lapack}*.a /usr/lib/gcc/x86_64-redhat-linux/8/lib{gfortran,quadmath}.a 2>/dev/null && find build -name '*.so' && find build -name 'ldsCtrlEst*.so' -exec ldd {} \\; && find build -name 'ldsCtrlEst*.so' -exec nm {} \\; | grep -E 'dorgqr|dgeqrf|dpotrf' | head -10 || echo 'No LAPACK symbols' && python -c 'import ldsctrlest; print(\"SUCCESS!\")' || echo 'FAILED'"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
