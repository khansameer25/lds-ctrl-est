name: Build and Test ldsCtrlEst

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Cache vcpkg and build
      uses: actions/cache@v3
      with:
        path: |
          vcpkg
          build
          ${{ github.workspace }}/vcpkg_cache
        key: ${{ runner.os }}-${{ hashFiles('vcpkg.json', 'CMakeLists.txt') }}

    - name: Setup vcpkg and install dependencies
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
      run: |
        if [ ! -d "vcpkg" ]; then
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh
        fi
        mkdir -p $VCPKG_DEFAULT_BINARY_CACHE
        ./vcpkg/vcpkg install --clean-after-build
      shell: bash

    - name: Install additional dependencies
      run: |
        if [ "${{ runner.os }}" == "macOS" ]; then
          brew install cmake gfortran
        elif [ "${{ runner.os }}" == "Linux" ]; then
          sudo apt-get update && sudo apt-get install -y cmake gfortran
        elif [ "${{ runner.os }}" == "Windows" ]; then
          choco install cmake
        fi
      shell: bash

    - name: Configure, build, and test
      run: |
        mkdir -p build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/install
        cmake --build . --config Release --parallel
        cmake --install .
        ctest -C Release --output-on-failure
      shell: bash
