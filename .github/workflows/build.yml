name: Build Wheels (Simple)

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Build wheels
        run: |
          pip install cibuildwheel
          python -m cibuildwheel python/ --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Install system dependencies with static libraries
          CIBW_BEFORE_ALL_LINUX: "dnf install -y cmake ninja-build gcc-c++ gcc-gfortran make openblas-devel openblas-static lapack-devel lapack-static hdf5-devel hdf5-static libgfortran-static libquadmath-static"
          CIBW_BEFORE_ALL_MACOS: "brew install cmake ninja openblas hdf5"
          CIBW_BEFORE_ALL_WINDOWS: "choco install cmake ninja"

          # Build without vcpkg - comprehensive static linking approach
          CIBW_BEFORE_BUILD: "pip install pybind11 numpy && sed -i 's|include(HDF5)|# include(HDF5)|' CMakeLists.txt && sed -i 's|include(Armadillo)|# include(Armadillo)|' CMakeLists.txt && sed -i 's|Python3::Python||' cmake/Modules/pybind11.cmake && cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DLDSCTRLEST_BUILD_PYTHON=ON -DLDSCTRLEST_BUILD_FITTING=OFF && cmake --build build --target python_modules"

          CIBW_TEST_COMMAND: 'python -c ''import ldsctrlest; print("SUCCESS!")'''

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
