name: Build and Test ldsCtrlEst

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up dependencies for macOS and Linux
      if: runner.os != 'Windows'
      run: |
        if [ "${{ runner.os }}" == "macOS" ]; then
          brew install ninja
        elif [ "${{ runner.os }}" == "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y build-essential
        fi
  
    - name: Run vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: 'vcpkg.json'
        runVcpkgInstall: true
        
    - name: Cache build directory
      uses: actions/cache@v3
      with:
        path: build
        key: build-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          build-${{ matrix.os }}-
          
    - name: Configure and build for macOS/Linux
      if: runner.os != 'Windows'
      uses: lukka/run-cmake@v10
      with:
        cmakeListsTxtPath: CMakeLists.txt
        configurePreset: 'linux-release'
        buildPreset: 'linux-release'
        cmakeVersion: '3.31.6'

    - name: Configure and build for Windows
      if: runner.os == 'Windows'
      uses: lukka/run-cmake@v10
      with:
        cmakeListsTxtPath: CMakeLists.txt
        configurePreset: 'windows-release'
        buildPreset: 'windows-release'
        buildPresetAdditionalArgs: "['--config Release']"
        cmakeVersion: '3.31.6'
        
    - name: Install and Update PATH (Windows only)
      if: runner.os == 'Windows'
      run: |
        cd build
        cmake --install .
        echo "${{github.workspace}}/install/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Run tests
      run: |
        cd build
        ctest -C Release
        
  build_python_package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest matplotlib cmake==3.31.6 build

      - name: Configure and build Python modules with CMake
        shell: bash
        run: |
          mkdir build && cd build
          cmake -DLDSCTRLEST_BUILD_PYTHON=ON \
                -DLDSCTRLEST_BUILD_STATIC=ON \
                -DCMAKE_BUILD_TYPE=Release \
                -DPYTHON_EXECUTABLE=$(which python) \
                -DPYTHON_INCLUDE_DIR=$(python -c 'from sysconfig import get_paths as gp; print(gp()["include"])') \
                -DPYTHON_LIBRARIES=$(python -c 'from sysconfig import get_paths as gp; print(gp()["stdlib"])') \
                -G "Unix Makefiles" ..
          cmake --build . --target python_modules

      - name: Install Python package and run tests
        run: |
          cd build/python
          pip install .
          pytest

      - name: Build wheel and sdist
        run: |
          cd build/python
          mkdir -p ../../wheels
          python -m build --wheel --outdir ../../wheels

      - name: Test wheel installation
        shell: bash
        run: |
          python -m venv test_env
          source test_env/bin/activate || . test_env/Scripts/activate
          pip install wheels/*.whl
          pip install numpy
          python -c "import ldsctrlest; print(ldsctrlest.__version__)"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}
          path: wheels/*.whl
          
  publish_all_wheels:
    needs: build_python_package
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS wheel
        uses: actions/download-artifact@v4
        with:
          name: python-wheel-macos-latest
          path: wheels/macos
      
      - name: Download Ubuntu wheel
        uses: actions/download-artifact@v4
        with:
          name: python-wheel-ubuntu-latest
          path: wheels/ubuntu

      - name: List downloaded wheels
        run: |
          find wheels -name "*.whl"

      - name: Publish macOS wheel
        uses: pypa/gh-action-pypi-publish@v1.4.2
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages_dir: wheels/macos
          repository_url: https://test.pypi.org/legacy/
        env:
          TWINE_LOG_LEVEL: DEBUG
      
      - name: Publish Ubuntu wheel
        uses: pypa/gh-action-pypi-publish@v1.4.2
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages_dir: wheels/ubuntu
          repository_url: https://test.pypi.org/legacy/
        env:
          TWINE_LOG_LEVEL: DEBUG
  
