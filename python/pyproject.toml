[build-system]
requires = ["scikit-build-core>=0.8", "cmake>=3.21", "ninja", "pybind11"]
build-backend = "scikit_build_core.build"

[project]
name = "ldsctrlest"
version = "0.9.0"
description = "Python bindings for ldsCtrlEst"
authors = [{ name = "Kyle Johnsen" }, { name = "Michael Bolus" }]
license = { text = "Apache-2.0" }
requires-python = ">=3.8"

# --- scikit-build-core configuration ---
[tool.scikit-build]
cmake.source-dir = ".."
cmake.args = [
    "-DCMAKE_TOOLCHAIN_FILE=${CMAKE_CURRENT_SOURCE_DIR}/vcpkg/scripts/buildsystems/vcpkg.cmake",
    "-DLDSCTRLEST_BUILD_PYTHON=ON",
    "-DLDSCTRLEST_BUILD_STATIC=ON"
]
cmake.install-dir = "ldsctrlest"
[tool.scikit-build.wheel]
packages = ["ldsctrlest"]

# --- cibuildwheel configuration ---
[tool.cibuildwheel]
# This is now the default for non-Windows, non-Linux builds (i.e., macOS)
before-build = "git submodule update --init --recursive && ./vcpkg/bootstrap-vcpkg.sh"
# Skip platforms we don't need
skip = ["*-musllinux*", "*i686"]
# Increase verbosity for better logs
build-verbosity = 1


[tool.cibuildwheel.linux]
# For Linux only, first install vcpkg's dependencies using yum, then run the bootstrap.
# We don't need `sudo` because we are already root inside the container.
manylinux-x86_64-image = "manylinux_2_28"
before-build = "yum install -y zip unzip tar curl && git submodule update --init --recursive && ./vcpkg/bootstrap-vcpkg.sh"


[tool.cibuildwheel.windows]
# This remains the same for Windows
before-build = "git submodule update --init --recursive && .\\vcpkg\\bootstrap-vcpkg.bat"


[tool.cibuildwheel.macos]
# This remains the same for macOS
archs = ["auto"]
